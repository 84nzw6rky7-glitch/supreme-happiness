<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LIFETAG</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <h1>LIFETAG</h1>
        <p>Capture meaningful moments, organize them by tags, and track progress.</p>
      </header>

      <section class="panel">
        <h2>Add a life tag</h2>
        <form id="entry-form" class="form-grid">
          <label>
            Title
            <input type="text" id="title" maxlength="80" placeholder="Morning run" required />
          </label>
          <label>
            Tag
            <input type="text" id="tag" maxlength="30" placeholder="health" required />
          </label>
          <label class="full-width">
            Note
            <textarea
              id="note"
              maxlength="200"
              rows="3"
              placeholder="What made this moment important?"
            ></textarea>
          </label>
          <button type="submit" class="btn-primary">Save Tag</button>
        </form>
      </section>

      <section class="panel panel-row">
        <div>
          <h2>Filter by tag</h2>
          <select id="tag-filter">
            <option value="all">All tags</option>
          </select>
        </div>
        <div class="stats" id="stats">0 complete / 0 total</div>
      </section>

      <section class="panel">
        <h2>Life tags</h2>
        <ul id="entry-list" class="entry-list"></ul>
        <p id="empty-state" class="empty-state">No life tags yet. Add your first one above.</p>
      </section>
    </main>

    <template id="entry-template">
      <li class="entry-card">
        <div class="entry-main">
          <div class="entry-top">
            <h3 class="entry-title"></h3>
            <span class="entry-tag"></span>
          </div>
          <p class="entry-note"></p>
        </div>
        <div class="entry-actions">
          <button type="button" class="btn-secondary toggle-btn"></button>
          <button type="button" class="btn-danger delete-btn">Delete</button>
        </div>
      </li>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
